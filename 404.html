<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Not Found — Pixel Pulse Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: #faf8f3;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .num {
    font-size: clamp(120px, 22vw, 280px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.04em;
    color: #2f5d54;
    font-style: italic;
    font-variation-settings: "opsz" 144, "SOFT" 100;
  }
  p { font-size: 20px; color: #4a4a4a; margin: 24px 0 36px; max-width: 480px; line-height: 1.5; }
  a {
    color: #1a1a1a;
    text-decoration: none;
    border-bottom: 1px solid #2f5d54;
    padding-bottom: 2px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  a:hover { color: #2f5d54; }
</style>
</head>
<body>
<div>
  <div class="num">404</div>
  <p>This page hasn't been built yet, or it once existed and the studio has quietly moved on.</p>
  <a href="/" class="mono">Return to the studio →</a>
</div>
</body>
</html>
